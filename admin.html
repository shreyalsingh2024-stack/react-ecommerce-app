<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase — Admin</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .admin-layout { display: flex; min-height: calc(100vh - 60px); }
    .sidebar { width: 220px; background: var(--dark); padding: 24px 0; flex-shrink: 0; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 12px 24px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .sidebar-item.active { background: rgba(249,202,36,0.1); color: var(--accent); border-left-color: var(--accent); }
    .sidebar-item i { width: 18px; }
    .sidebar-section { padding: 8px 24px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-top: 16px; }

    .admin-content { flex: 1; padding: 32px; overflow-y: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: white; border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
    .stat-card .stat-icon { font-size: 1.8rem; margin-bottom: 12px; }
    .stat-card .stat-val { font-size: 2rem; font-weight: 800; color: var(--dark); }
    .stat-card .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* Table */
    .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .admin-table th { background: var(--dark); color: white; padding: 14px 18px; text-align: left; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-table td { padding: 14px 18px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafafa; }

    .product-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .section-header h2 { font-size: 1.3rem; color: var(--dark); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="admin.html" class="nav-logo"><i class="fa-solid fa-bag-shopping"></i> ShopEase <span style="font-size:0.7rem;background:var(--red);color:white;padding:2px 8px;border-radius:20px;margin-left:8px">ADMIN</span></a>
    <div class="nav-links">
      <div class="nav-user">Admin: <span id="adminName">--</span></div>
      <button onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </nav>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">Dashboard</div>
      <div class="sidebar-item active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-gauge"></i> Overview</div>
      <div class="sidebar-section">Manage</div>
      <div class="sidebar-item" onclick="switchTab('orders', this)"><i class="fa-solid fa-receipt"></i> Orders</div>
      <div class="sidebar-item" onclick="switchTab('products', this)"><i class="fa-solid fa-box"></i> Products</div>
      <div class="sidebar-item" onclick="switchTab('users', this)"><i class="fa-solid fa-users"></i> Users</div>
    </aside>

    <!-- Content -->
    <main class="admin-content">

      <!-- DASHBOARD -->
      <div class="tab-content active" id="tab-dashboard">
        <h2 style="margin-bottom:24px;color:var(--dark)">Dashboard Overview</h2>
        <div class="stats-grid" id="statsGrid"></div>
        <h3 style="margin-bottom:16px;color:var(--dark)">Recent Orders</h3>
        <div id="recentOrders"></div>
      </div>

      <!-- ORDERS -->
      <div class="tab-content" id="tab-orders">
        <div class="section-header">
          <h2>All Orders</h2>
          <span id="orderCountBadge" class="badge badge-blue"></span>
        </div>
        <table class="admin-table">
          <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>

      <!-- PRODUCTS -->
      <div class="tab-content" id="tab-products">
        <div class="section-header"><h2>Product Catalog</h2><span class="badge badge-blue">${PRODUCTS?.length || 15} products</span></div>
        <table class="admin-table">
          <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Rating</th></tr></thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>

      <!-- USERS -->
      <div class="tab-content" id="tab-users">
        <div class="section-header"><h2>Registered Users</h2></div>
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Orders</th></tr></thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
  <script>
    requireAuth();
    const user = getCurrentUser();
    if (!user.isAdmin) window.location.href = "shop.html";
    document.getElementById("adminName").textContent = user.name;

    const allOrders = getAllOrders();
    const allUsers  = getUsers().filter(u => !u.isAdmin);
    const revenue   = allOrders.reduce((s, o) => s + o.total + Math.round(o.total * 0.18), 0);

    // Stats
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${allOrders.length}</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val">₹${revenue.toLocaleString()}</div><div class="stat-label">Total Revenue</div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">${allUsers.length}</div><div class="stat-label">Registered Users</div></div>
      <div class="stat-card"><div class="stat-icon">🛍️</div><div class="stat-val">${PRODUCTS.length}</div><div class="stat-label">Products Listed</div></div>`;

    // Recent Orders (dashboard)
    renderOrdersTable("recentOrders", allOrders.slice(0, 5));

    // Orders Tab
    document.getElementById("orderCountBadge").textContent = `${allOrders.length} orders`;
    renderOrdersTable("ordersTableBody", allOrders);

    function renderOrdersTable(containerId, orders) {
      const container = document.getElementById(containerId);
      if (!orders.length) {
        container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-receipt"></i><h3>No orders yet</h3></div>`;
        return;
      }
      const rows = orders.map(o => {
        const date = new Date(o.timestamp).toLocaleDateString("en-IN");
        const total = o.total + Math.round(o.total * 0.18);
        return `<tr>
          <td><code style="font-size:0.8rem">${o.id}</code></td>
          <td><strong>${o.userName || "N/A"}</strong><br/><span style="color:var(--muted);font-size:0.8rem">${o.userEmail || ""}</span></td>
          <td>${o.items?.length || 0} items</td>
          <td><strong>₹${total}</strong></td>
          <td>${o.payment?.method?.toUpperCase() || "N/A"}</td>
          <td><span class="badge badge-green">${o.status}</span></td>
          <td>${date}</td>
        </tr>`;
      }).join("");

      if (containerId === "recentOrders") {
        container.innerHTML = `<table class="admin-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>`;
      } else {
        container.innerHTML = rows;
      }
    }

    // Products Table
    document.getElementById("productsTableBody").innerHTML = PRODUCTS.map(p => `
      <tr>
        <td><img src="${p.image}" class="product-thumb" alt="${p.name}"/></td>
        <td><strong>${p.name}</strong></td>
        <td><span class="badge badge-blue">${p.category}</span></td>
        <td><strong>₹${p.price}</strong></td>
        <td><span class="${p.stock <= 5 ? 'badge badge-yellow' : 'badge badge-green'}">${p.stock}</span></td>
        <td>⭐ ${p.rating}</td>
      </tr>`).join("");

    // Users Table
    document.getElementById("usersTableBody").innerHTML = allUsers.length
      ? allUsers.map(u => {
          const userOrders = JSON.parse(localStorage.getItem(`se_orders_${u.email}`) || "[]");
          return `<tr>
            <td><strong>${u.name}</strong></td>
            <td>${u.email}</td>
            <td><span class="badge badge-blue">Customer</span></td>
            <td>${userOrders.length} orders</td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:30px">No users registered yet</td></tr>`;

    function switchTab(name, el) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".sidebar-item").forEach(s => s.classList.remove("active"));
      document.getElementById(`tab-${name}`).classList.add("active");
      el.classList.add("active");
    }
  </script>
</body>
</html>
