<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase — Login</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
      color: #f9ca24;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .auth-logo i { margin-right: 10px; }

    .auth-card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .auth-tabs {
      display: flex;
      background: #f4f5f7;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: white;
      color: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-form h2 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    .auth-form p {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .demo-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #aaa;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 10px;
    }

    .demo-hint strong { color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <i class="fa-solid fa-bag-shopping"></i> ShopEase
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="loginForm">
        <h2>Welcome back!</h2>
        <p>Login to continue shopping</p>
        <div class="error-msg" id="loginError"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
        <div class="demo-hint">
          Demo Admin: <strong>admin@shopease.com</strong> / <strong>admin123</strong>
        </div>
      </div>

      <!-- Signup Form -->
      <div class="auth-form" id="signupForm">
        <h2>Create account</h2>
        <p>Join ShopEase and start shopping</p>
        <div class="error-msg" id="signupError"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters"/>
        </div>
        <button class="btn btn-accent btn-full" onclick="handleSignup()">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Redirect if already logged in
    requireGuest();

    function switchTab(tab) {
      document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      document.getElementById("loginForm").classList.toggle("active", tab === "login");
      document.getElementById("signupForm").classList.toggle("active", tab === "signup");
    }

    function handleLogin() {
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const errEl    = document.getElementById("loginError");

      if (!email || !password) {
        return showError(errEl, "Please fill in all fields.");
      }

      const users = getUsers();
      const user  = users.find(u => u.email === email && u.password === password);

      if (!user) {
        return showError(errEl, "Invalid email or password.");
      }

      setCurrentUser(user);
      window.location.href = user.isAdmin ? "admin.html" : "shop.html";
    }

    function handleSignup() {
      const name     = document.getElementById("signupName").value.trim();
      const email    = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const errEl    = document.getElementById("signupError");

      if (!name || !email || !password) return showError(errEl, "Please fill in all fields.");
      if (password.length < 6) return showError(errEl, "Password must be at least 6 characters.");

      const users = getUsers();
      if (users.find(u => u.email === email)) return showError(errEl, "Email already registered.");

      const newUser = { name, email, password, isAdmin: false };
      users.push(newUser);
      saveUsers(users);
      setCurrentUser(newUser);
      window.location.href = "shop.html";
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.style.display = "block";
      setTimeout(() => el.style.display = "none", 3000);
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const activeForm = document.querySelector(".auth-form.active").id;
        activeForm === "loginForm" ? handleLogin() : handleSignup();
      }
    });
  </script>
</body>
</html>
